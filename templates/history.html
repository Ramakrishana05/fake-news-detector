{% extends "base.html" %}
{% block content %}
<h2>Prediction History</h2>

<table class="table table-dark table-striped">
<tr>
    <th>News</th>
    <th>Result</th>
    <th>Date</th>
</tr>

{% for row in data %}
<tr>
    <td>{{ row[0][:100] }}...</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
</tr>
{% endfor %}
</table>

{% endblock %}
