{% extends "base.html" %}
{% block content %}
<h2>News Prediction</h2>

<form method="POST">
    <textarea class="form-control" name="news" rows="6" required></textarea>
    <br>
    <button class="btn btn-primary">Check News</button>
</form>

{% if prediction %}
<div class="alert alert-info mt-3">
    Result: <strong>{{ prediction }}</strong>
</div>
{% endif %}

{% endblock %}
