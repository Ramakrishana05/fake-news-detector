{% extends "base.html" %}
{% block content %}
<h2>Admin Panel</h2>
<a href="/export" class="btn btn-success mb-3">Export PDF</a>
<a href="/logout" class="btn btn-danger mb-3">Logout</a>

<table class="table table-dark">
<tr>
<th>ID</th><th>News</th><th>Result</th><th>Date</th><th>Action</th>
</tr>
{% for row in data %}
<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1][:50] }}...</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
<td><a href="/delete/{{ row[0] }}" class="btn btn-sm btn-danger">Delete</a></td>
</tr>
{% endfor %}
</table>
{% endblock %}
