<!DOCTYPE html>
<html>
<head>
    <title>Fake News Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    background-size: 400% 400%;
    animation: gradient 15s ease infinite;
    color: white;
}

@keyframes gradient {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
}
</style>
</head>
<body>

<div class="overlay">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark rounded">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">Fake News Detector</a>
    <div>
      <a class="btn btn-outline-light m-1" href="/">Home</a>
      <a class="btn btn-outline-light m-1" href="/about">About</a>
      <a class="btn btn-outline-light m-1" href="/predict">Prediction</a>
      <a class="btn btn-outline-light m-1" href="/history">History</a>
    </div>
  </div>
</nav>

<div class="container mt-4">
{% block content %}{% endblock %}
</div>

</div>
</body>
</html>
